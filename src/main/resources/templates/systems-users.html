<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems — All Users</title>
    <style>
        :root {
            --navy: #2c3e50;
            --teal: #2ec4b6;
            --bg: #f4f7f6;
            --root-red: #c0392b;
            --root-red-dark: #962d22;
            --border: #e2e8e6;
            --text-muted: #6b7a78;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--navy);
        }

        .systems-navbar {
            background-color: var(--navy);
            border-bottom: 4px solid var(--root-red);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .systems-navbar .brand {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .root-tag {
            background-color: var(--root-red);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .systems-navbar .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 8px 14px;
            border-radius: 6px;
            background-color: rgba(255,255,255,0.08);
            transition: background-color 0.15s ease;
        }

        .nav-links a:hover {
            background-color: rgba(255,255,255,0.18);
        }

        .nav-links a.active {
            background-color: var(--root-red);
        }

        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        .page-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .page-header h1 {
            font-size: 1.4rem;
            margin: 0;
        }

        .page-header .count {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .table-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .table-scroll {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 640px;
        }

        thead th {
            background-color: var(--navy);
            color: white;
            text-align: left;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 12px 16px;
            white-space: nowrap;
        }

        tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.92rem;
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: #fafbfb;
        }

        .username-cell {
            font-weight: 600;
            color: var(--navy);
        }

        .email-cell {
            color: var(--text-muted);
        }

        .actions-cell {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 7px 12px;
            border-radius: 6px;
            white-space: nowrap;
            transition: opacity 0.15s ease;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-teal {
            background-color: var(--teal);
            color: white;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--navy);
            border: 1px solid var(--border);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        /* Phone-friendly: stack table into cards below 640px */
        @media (max-width: 640px) {
            .page-wrap { padding: 16px 10px 40px; }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            tbody tr {
                background: white;
                border: 1px solid var(--border);
                border-radius: 8px;
                margin-bottom: 12px;
                padding: 12px;
            }

            tbody td {
                border-bottom: none;
                padding: 6px 4px;
                display: flex;
                justify-content: space-between;
                gap: 12px;
                font-size: 0.88rem;
            }

            tbody td::before {
                content: attr(data-label);
                font-weight: 700;
                color: var(--text-muted);
                font-size: 0.72rem;
                text-transform: uppercase;
                letter-spacing: 0.03em;
                flex-shrink: 0;
            }

            .actions-cell {
                justify-content: flex-start;
                padding-top: 8px;
            }

            .table-card {
                box-shadow: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>

<nav class="systems-navbar">
    <div class="brand">
        Smart Fridge <span class="root-tag">Admin</span>
    </div>
    <div class="nav-links">
        <a th:href="@{/systems/users}" class="active">All Users</a>
        <a th:href="@{/systems/viewall}">All Items</a>
        <a th:href="@{/home}">Back to App</a>
    </div>
</nav>

<div class="page-wrap">
    <div class="page-header">
        <h1>All Users</h1>
        <span class="count" th:text="${#lists.size(users)} + ' total'">0 total</span>
    </div>

    <div class="table-card">
        <div class="table-scroll" th:if="${not #lists.isEmpty(users)}">
            <table>
                <thead>
                <tr>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Created At</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td data-label="Username" class="username-cell" th:text="${user.username}">jdoe</td>
                    <td data-label="Full Name" th:text="${user.firstName} + ' ' + ${user.lastName}">Jane Doe</td>
                    <td data-label="Email" class="email-cell" th:text="${user.email}">jane@example.com</td>
                    <td data-label="Created At" th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy, HH:mm')}">01 Jan 2026</td>
                    <td data-label="Actions">
                        <div class="actions-cell">
                            <a class="btn btn-teal" th:href="@{/systems/users/{id}(id=${user.id})}">Fridge Items</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(users)}">
            No users found.
        </div>
    </div>
</div>

</body>
</html>
